<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NanoClaw - Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --accent: #4a90d9;
      --text-primary: #eaeaea;
      --text-secondary: #a0a0a0;
      --user-bubble: #4a90d9;
      --assistant-bubble: #2d3748;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--bg-secondary);
      padding: 1rem 2rem;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 1.5rem;
      color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #48bb78;
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: #f56565;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 80%;
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-bottom-right-radius: 0.25rem;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-bubble);
      border-bottom-left-radius: 0.25rem;
    }

    .message-time {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 0.5rem;
      text-align: right;
    }

    .input-container {
      background: var(--bg-secondary);
      padding: 1rem 2rem;
      border-top: 1px solid #2d3748;
    }

    .input-wrapper {
      display: flex;
      gap: 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    #messageInput {
      flex: 1;
      padding: 1rem 1.5rem;
      border: none;
      border-radius: 2rem;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
    }

    #messageInput:focus {
      box-shadow: 0 0 0 2px var(--accent);
    }

    #sendButton {
      padding: 1rem 2rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    #sendButton:hover {
      background: #3a7bc8;
    }

    #sendButton:disabled {
      background: var(--text-secondary);
      cursor: not-allowed;
    }

    .welcome {
      text-align: center;
      color: var(--text-secondary);
      margin-top: 4rem;
    }

    .welcome h2 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    /* Markdown-like styling for code blocks */
    .message pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 1rem;
      border-radius: 0.5rem;
      overflow-x: auto;
      margin: 0.5rem 0;
    }

    .message code {
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 0.9em;
    }

    .message p {
      margin-bottom: 0.5rem;
    }

    .message p:last-child {
      margin-bottom: 0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 1rem;
      }

      .chat-container {
        padding: 1rem;
      }

      .message {
        max-width: 90%;
      }

      .input-container {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>NanoClaw</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome">
      <h2>Welcome to NanoClaw</h2>
      <p>Type a message below to start chatting with your AI assistant.</p>
    </div>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <input
        type="text"
        id="messageInput"
        placeholder="Type your message..."
        autocomplete="off"
      />
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let ws;
    let isConnected = false;

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}`;

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        isConnected = true;
        statusDot.classList.remove('disconnected');
        statusText.textContent = 'Connected';
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'history') {
          // Clear welcome message and show history
          const welcome = chatContainer.querySelector('.welcome');
          if (welcome) {
            welcome.remove();
          }

          data.messages.forEach((msg) => {
            appendMessage(msg.content, msg.isUser);
          });
        } else if (data.type === 'message') {
          const welcome = chatContainer.querySelector('.welcome');
          if (welcome) {
            welcome.remove();
          }
          appendMessage(data.message.content, data.message.isUser);
        }
      };

      ws.onclose = () => {
        isConnected = false;
        statusDot.classList.add('disconnected');
        statusText.textContent = 'Disconnected';

        // Try to reconnect after 3 seconds
        setTimeout(connect, 3000);
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
    }

    function appendMessage(content, isUser) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

      // Simple markdown-like formatting
      let formattedContent = content
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/## (.+)/g, '<h3>$1</h3>')
        .replace(/# (.+)/g, '<h2>$1</h2>')
        .replace(/\n/g, '<br>');

      messageDiv.innerHTML = formattedContent;

      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      const now = new Date();
      timeDiv.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      messageDiv.appendChild(timeDiv);
      chatContainer.appendChild(messageDiv);

      // Scroll to bottom
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function sendMessage() {
      const content = messageInput.value.trim();
      if (!content || !isConnected) return;

      ws.send(JSON.stringify({
        type: 'chat',
        content,
        timestamp: Date.now()
      }));

      // Show user message immediately
      appendMessage(content, true);
      messageInput.value = '';
    }

    // Event listeners
    sendButton.addEventListener('click', sendMessage);

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Connect on load
    connect();
  </script>
</body>
</html>
